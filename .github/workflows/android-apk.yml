name: Android APK Oluştur

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle yetki ver
        run: chmod +x ./gradlew

      - name: APK oluştur
        run: ./gradlew assembleDebug

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: SahaSiparis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
